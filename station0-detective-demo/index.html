<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>第0关 · 探索发现 — Copula 精算侦探</title>
<script>
  window.MathJax = {
    tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] },
    svg: { fontCache: 'global' },
    startup: { typeset: false }
  };
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
<style>
:root{
  --bg:#10141c; --bg2:#161c28; --panel:#1b2333; --panel2:#222c40;
  --ink:#e8edf6; --muted:#8b96ad; --line:#2c3950;
  --red:#e74c3c; --blue:#2980b9; --purple:#8e44ad; --gray:#95a5a6;
  --gold:#e3b341; --accent:#4aa3ff; --good:#2ecc71;
  --shadow:0 10px 40px rgba(0,0,0,.5);
  --r:16px;
}
/* ---------- 浅色主题（默认，老师偏好） ---------- */
body.theme-light{
  --bg:#f4f6f9; --bg2:#eef1f6; --panel:#ffffff; --panel2:#f7f9fc;
  --ink:#22303f; --muted:#69788c; --line:#e2e8f0;
  --gold:#c8901a; --accent:#2d7fd6; --good:#27ae60;
  --shadow:0 8px 30px rgba(40,60,90,.12);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  background:
    radial-gradient(1200px 700px at 80% -10%, rgba(74,163,255,.10), transparent 60%),
    radial-gradient(900px 600px at -10% 110%, rgba(142,68,173,.10), transparent 60%),
    var(--bg);
  color:var(--ink); overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  transition:background .3s,color .3s;
}
/* 浅色下各卡片/弹窗的渐变改为浅色，避免深色硬编码漏出 */
body.theme-light .card,
body.theme-light .topbar{background:linear-gradient(180deg,#ffffff,#f7f9fc);}
body.theme-light .canvas-shell{background:radial-gradient(120% 120% at 50% 50%, #ffffff, #eef2f7);}
body.theme-light .chip{background:#eef2f7;}
body.theme-light .kpi{background:#f5f8fc;}
body.theme-light .task-card{background:linear-gradient(135deg,#fffaf0,#fef6e9);}
body.theme-light .nash-tip{background:#eef5fc;color:#3a4a5e;}
body.theme-light .modal{background:linear-gradient(180deg,#ffffff,#f6f8fb);color:var(--ink);}
body.theme-light .bet-opt{background:#f5f8fc;color:var(--ink);}
body.theme-light .bet-opt .mini{background:#eef2f7;}
body.theme-light .flip-front{background:linear-gradient(135deg,#eef2f7,#e3e9f2);color:var(--muted);}
body.theme-light .formula-box{background:#f5f8fc;}
body.theme-light .dex-card{background:#f5f8fc;}
body.theme-light .dex-lock{color:#aab4c6;}
body.theme-light .insight .row .txt{color:#33455a;}
body.theme-light .nash-bubble{background:linear-gradient(135deg,#ffffff,#f4f8fd);color:#33455a;}
body.theme-light input[type=range]{background:linear-gradient(90deg,var(--accent) 0%,#d6dee9 0%);}
body.theme-light .topbar::before{opacity:.4;}

/* 顶部按钮 */
.tbtn{border:1px solid var(--line);background:#141a26;color:var(--ink);cursor:pointer;
  font-size:12.5px;font-weight:700;border-radius:9px;padding:7px 11px;transition:.18s;line-height:1;}
.tbtn:hover{border-color:var(--accent);transform:translateY(-1px);}
body.theme-light .tbtn{background:#eef2f7;}

/* 下注卡顶部醒目嫌疑人横幅 ① */
.suspect-headline{border:2px solid var(--sc);border-radius:14px;padding:12px 14px;text-align:center;
  background:linear-gradient(135deg, color-mix(in srgb, var(--sc) 18%, transparent), transparent);}
.suspect-headline .sh-label{font-size:12px;letter-spacing:1px;color:var(--sc);font-weight:800;opacity:.9;}
.suspect-headline .sh-name{font-size:30px;font-weight:900;margin:3px 0 7px;color:var(--sc);letter-spacing:.5px;}
.suspect-headline .sh-tail{display:inline-block;font-size:12.5px;font-weight:800;color:#fff;padding:4px 14px;border-radius:30px;}
.wrap{max-width:1180px;margin:0 auto;padding:18px 16px 60px;}

/* ---------- 顶部侦探板 ---------- */
.topbar{
  display:flex;align-items:center;gap:14px;flex-wrap:wrap;
  background:linear-gradient(180deg,var(--panel),var(--panel2));
  border:1px solid var(--line);border-radius:var(--r);
  padding:14px 18px;box-shadow:var(--shadow);position:relative;overflow:hidden;
}
.topbar::before{content:"";position:absolute;inset:0;
  background:repeating-linear-gradient(45deg,rgba(255,255,255,.015) 0 12px,transparent 12px 24px);pointer-events:none;}
.brand{font-weight:800;font-size:19px;letter-spacing:.5px;display:flex;align-items:center;gap:9px;}
.brand .dot{width:11px;height:11px;border-radius:50%;background:var(--red);box-shadow:0 0 12px var(--red);animation:pulse 1.6s infinite;}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.4);opacity:.55}}
.progress-wrap{display:flex;align-items:center;gap:8px;margin-left:auto;}
.dossier{display:flex;gap:7px;}
.chip{
  width:34px;height:34px;border-radius:9px;border:1.5px solid var(--line);
  display:flex;align-items:center;justify-content:center;font-size:16px;
  background:#141a26;color:var(--muted);transition:.35s; position:relative;
}
.chip.done{color:#fff;border-color:transparent;box-shadow:0 0 14px rgba(0,0,0,.4);}
.chip.active{border-color:var(--gold);box-shadow:0 0 0 2px rgba(227,179,65,.25);}
.prog-text{font-size:13px;color:var(--muted);white-space:nowrap;}
.toggle{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--muted);cursor:pointer;user-select:none;}
.toggle input{display:none;}
.toggle .sw{width:38px;height:21px;border-radius:20px;background:#2a3550;position:relative;transition:.25s;}
.toggle .sw::after{content:"";position:absolute;top:2px;left:2px;width:17px;height:17px;border-radius:50%;background:#7b88a3;transition:.25s;}
.toggle input:checked + .sw{background:var(--accent);}
.toggle input:checked + .sw::after{transform:translateX(17px);background:#fff;}

/* ---------- 主体布局 ---------- */
.main{display:grid;grid-template-columns:1.4fr .9fr;gap:18px;margin-top:18px;}
@media(max-width:860px){.main{grid-template-columns:1fr;}}

.card{
  background:linear-gradient(180deg,var(--panel),#192133);
  border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);
}
.stage{padding:14px;position:relative;}
.stage-head{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
.suspect-badge{
  display:inline-flex;align-items:center;gap:8px;padding:6px 13px;border-radius:30px;
  font-weight:800;font-size:14px;border:1.5px solid;
}
.tail-tag{font-size:11px;padding:3px 9px;border-radius:20px;color:#fff;font-weight:700;}
.canvas-shell{
  position:relative;width:100%;aspect-ratio:1/1;max-height:520px;
  border-radius:13px;overflow:hidden;
  background:radial-gradient(120% 120% at 50% 50%, #0e1320, #0a0d16);
  border:1px solid var(--line);
}
@media(max-width:860px){.canvas-shell{aspect-ratio:1/1;}}
#flow{display:block;width:100%;height:100%;}
.corner-label{position:absolute;font-size:10.5px;color:#6b7790;pointer-events:none;font-weight:600;letter-spacing:.5px;}
.cl-ur{top:8px;right:10px;} .cl-ll{bottom:8px;left:10px;}
.cl-ul{top:8px;left:10px;} .cl-lr{bottom:8px;right:10px;}
.axis-hint{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);font-size:10px;color:#566;letter-spacing:1px;pointer-events:none;}

/* KPI 仪表 */
.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px;}
.kpi{background:#131a28;border:1px solid var(--line);border-radius:11px;padding:10px 8px;text-align:center;position:relative;overflow:hidden;}
.kpi .k-name{font-size:11px;color:var(--muted);}
.kpi .k-val{font-size:22px;font-weight:800;margin-top:2px;font-variant-numeric:tabular-nums;transition:color .2s;}
.kpi .k-bar{height:5px;border-radius:4px;background:#26314a;margin-top:7px;overflow:hidden;}
.kpi .k-fill{height:100%;width:0;border-radius:4px;transition:width .15s linear;}
.kpi.hit{box-shadow:0 0 0 2px rgba(46,204,113,.5);}
.kpi.hit .k-val{color:var(--good);}

/* 控制台 */
.console{padding:16px;display:flex;flex-direction:column;gap:14px;}
.ctrl{}
.ctrl label{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);margin-bottom:7px;}
.ctrl label b{color:var(--ink);font-variant-numeric:tabular-nums;}
input[type=range]{-webkit-appearance:none;width:100%;height:8px;border-radius:6px;
  background:linear-gradient(90deg,var(--accent) 0%,#2a3550 0%);outline:none;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;
  background:#fff;border:3px solid var(--accent);box-shadow:0 2px 8px rgba(0,0,0,.5);cursor:grab;transition:transform .1s;}
input[type=range]::-webkit-slider-thumb:active{transform:scale(1.18);cursor:grabbing;}
input[type=range]::-moz-range-thumb{width:24px;height:24px;border-radius:50%;background:#fff;border:3px solid var(--accent);cursor:grab;}

.task-card{background:linear-gradient(135deg,#1d2740,#172033);border:1px dashed var(--gold);
  border-radius:12px;padding:13px 14px;font-size:13.5px;line-height:1.55;}
.task-card .tc-h{font-weight:800;color:var(--gold);font-size:12px;letter-spacing:1px;margin-bottom:5px;}
.task-card .goal{color:var(--ink);}
.task-progress{margin-top:9px;height:7px;border-radius:5px;background:#26314a;overflow:hidden;}
.task-progress .tp-fill{height:100%;width:0;background:linear-gradient(90deg,var(--gold),var(--good));border-radius:5px;transition:width .2s;}

.hint-line{font-size:12.5px;color:var(--muted);line-height:1.5;}
.nash-tip{background:#131a28;border-left:3px solid var(--accent);border-radius:0 9px 9px 0;
  padding:9px 12px;font-size:12.5px;color:#c3ccdd;line-height:1.5;}
.nash-tip b{color:var(--accent);}

/* ---------- 弹窗 / 卡片层 ---------- */
.overlay{position:fixed;inset:0;background:rgba(8,11,18,.72);backdrop-filter:blur(4px);
  display:none;align-items:center;justify-content:center;z-index:50;padding:18px;}
.overlay.show{display:flex;animation:fadeIn .3s;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:linear-gradient(180deg,#1d273c,#151d2c);border:1px solid var(--line);
  border-radius:20px;box-shadow:0 30px 80px rgba(0,0,0,.7);max-width:460px;width:100%;
  padding:24px;animation:pop .4s cubic-bezier(.2,1.3,.4,1);}
@keyframes pop{from{transform:scale(.85) translateY(20px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.modal h3{margin:0 0 4px;font-size:19px;}
.modal .sub{color:var(--muted);font-size:13px;margin-bottom:16px;}

/* 下注选项 */
.bet-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:6px;}
.bet-opt{position:relative;border:1.5px solid var(--line);background:#141c2c;border-radius:13px;
  padding:16px 12px;cursor:pointer;text-align:center;transition:.2s;font-weight:700;font-size:14px;}
.bet-opt .mini{display:block;margin:0 auto 8px;width:50px;height:50px;border-radius:9px;background:#0e1421;position:relative;border:1px solid var(--line);}
.bet-opt .mini i{position:absolute;width:16px;height:16px;border-radius:4px;background:var(--gold);filter:blur(1px);opacity:.9;}
.bet-opt:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:0 8px 20px rgba(0,0,0,.4);}
.bet-opt.sel{border-color:var(--gold);box-shadow:0 0 0 2px rgba(227,179,65,.3);}

/* 揭晓 - 翻牌 */
.reveal-flip{perspective:1000px;margin:8px auto 14px;width:170px;height:170px;}
.flip-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;
  transition:transform .9s cubic-bezier(.4,.1,.2,1);}
.flip-inner.flipped{transform:rotateY(180deg);}
.flip-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:16px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:800;}
.flip-front{background:linear-gradient(135deg,#2a3550,#1c2740);border:1.5px solid var(--line);font-size:46px;color:var(--muted);}
.flip-back{background:linear-gradient(135deg,#1d3a2a,#16302a);border:1.5px solid var(--good);transform:rotateY(180deg);}
.flip-back.miss{background:linear-gradient(135deg,#3a2a2a,#30262a);border-color:#c97b4a;}
.flip-back .big{font-size:40px;}
.flip-back .res{font-size:15px;margin-top:6px;}

/* 顿悟卡 */
.insight .row{display:flex;gap:9px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:13.5px;line-height:1.5;}
.insight .row .tag{flex:0 0 56px;font-weight:800;font-size:12px;color:var(--gold);}
.insight .row .txt{color:#d6deeb;}
.formula-toggle{margin-top:10px;}
.formula-toggle summary{cursor:pointer;color:var(--accent);font-size:13px;font-weight:700;list-style:none;}
.formula-toggle summary::-webkit-details-marker{display:none;}
.formula-box{background:#0f1420;border:1px solid var(--line);border-radius:10px;padding:12px;margin-top:9px;font-size:14px;overflow-x:auto;}
.money-hook{margin-top:14px;background:linear-gradient(135deg,rgba(227,179,65,.13),rgba(227,179,65,.04));
  border:1px solid rgba(227,179,65,.4);border-radius:12px;padding:12px 14px;font-size:13px;line-height:1.55;color:#f0e3c0;}
.money-hook b{color:var(--gold);}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border:none;cursor:pointer;
  font-weight:800;font-size:15px;border-radius:12px;padding:13px 18px;width:100%;margin-top:16px;
  background:linear-gradient(135deg,var(--accent),#2d7fd6);color:#fff;box-shadow:0 8px 22px rgba(45,127,214,.4);transition:.15s;}
.btn:hover{filter:brightness(1.08);transform:translateY(-1px);}
.btn.gold{background:linear-gradient(135deg,var(--gold),#cf9b2e);box-shadow:0 8px 22px rgba(227,179,65,.4);color:#221a06;}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}

/* ---------- 图鉴墙 ---------- */
.gallery{margin-top:20px;}
.gallery h4{font-size:13px;color:var(--muted);letter-spacing:1px;margin:0 0 11px;font-weight:700;}
.dex{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;}
@media(max-width:680px){.dex{grid-template-columns:repeat(2,1fr);}}
.dex-card{position:relative;aspect-ratio:3/4;border-radius:14px;overflow:hidden;
  background:#141b29;border:1.5px solid var(--line);transition:.3s;perspective:900px;}
.dex-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .8s cubic-bezier(.3,1.2,.4,1);}
.dex-card.unlocked .dex-inner{transform:rotateY(360deg);}
.dex-face{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px;backface-visibility:hidden;}
.dex-lock{color:#46506a;font-size:34px;}
.dex-lock .lk-name{font-size:11px;margin-top:8px;color:#566;}
.dex-card.unlocked{border-color:transparent;}
.dex-open{opacity:0;transition:opacity .3s .4s;}
.dex-card.unlocked .dex-open{opacity:1;}
.dex-open .emo{font-size:30px;}
.dex-open .nm{font-weight:800;font-size:15px;margin-top:4px;}
.dex-open .ti{font-size:11px;color:#fff;padding:2px 8px;border-radius:12px;margin-top:5px;}
.dex-open .lam{font-size:10.5px;color:var(--muted);margin-top:7px;text-align:center;line-height:1.4;}
.stamp{position:absolute;top:8px;right:8px;width:42px;height:42px;border-radius:50%;
  border:2.5px solid var(--good);color:var(--good);display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:900;transform:rotate(-18deg) scale(0);opacity:0;}
.dex-card.unlocked .stamp{animation:stampIn .6s .5s cubic-bezier(.2,2,.4,1) forwards;}
@keyframes stampIn{0%{transform:rotate(40deg) scale(2.4);opacity:0}60%{transform:rotate(-18deg) scale(.9);opacity:1}100%{transform:rotate(-18deg) scale(1);opacity:1}}
.shine{position:absolute;top:0;left:-60%;width:50%;height:100%;
  background:linear-gradient(115deg,transparent,rgba(255,255,255,.45),transparent);pointer-events:none;opacity:0;}
.dex-card.unlocked .shine{animation:sweep 1s 1s ease-out forwards;}
@keyframes sweep{0%{left:-60%;opacity:.9}100%{left:130%;opacity:0}}

/* 通关庆祝 */
#confetti{position:fixed;inset:0;pointer-events:none;z-index:60;display:none;}
.finale{text-align:center;}
.finale .big-emo{font-size:60px;animation:bounce 1s infinite;}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}

.footnote{margin-top:26px;text-align:center;color:#4a5468;font-size:11.5px;line-height:1.6;}

/* Nash 浮窗 */
.nash-fab{position:fixed;right:16px;bottom:16px;z-index:40;display:flex;flex-direction:column;align-items:flex-end;gap:8px;}
.nash-bubble{max-width:230px;background:linear-gradient(135deg,#1d273c,#151d2c);border:1px solid var(--line);
  border-radius:14px 14px 4px 14px;padding:11px 13px;font-size:12.5px;line-height:1.5;color:#cdd6e6;box-shadow:var(--shadow);
  opacity:0;transform:translateY(8px) scale(.96);transition:.3s;pointer-events:none;}
.nash-bubble.show{opacity:1;transform:none;}
.nash-bubble b{color:var(--accent);}
.nash-orb{width:52px;height:52px;border-radius:50%;cursor:pointer;
  background:radial-gradient(circle at 35% 30%,#6fb8ff,#2d7fd6 60%,#1a4f8a);
  display:flex;align-items:center;justify-content:center;font-size:24px;
  box-shadow:0 6px 22px rgba(45,127,214,.5),inset 0 0 14px rgba(255,255,255,.25);animation:float 3.5s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

.pop-toast{position:fixed;top:18px;left:50%;transform:translateX(-50%) translateY(-80px);z-index:70;
  background:linear-gradient(135deg,var(--good),#27ae60);color:#fff;font-weight:800;padding:11px 20px;border-radius:30px;
  box-shadow:0 10px 30px rgba(0,0,0,.4);transition:transform .4s cubic-bezier(.2,1.4,.4,1);font-size:14px;}
.pop-toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="wrap">

  <!-- 顶部侦探板 -->
  <div class="topbar">
    <div class="brand"><span class="dot"></span>🕵️ 精算侦探 · 第0关 探索发现</div>
    <div class="progress-wrap">
      <div class="dossier" id="dossierChips"></div>
      <span class="prog-text" id="progText">图鉴 0/4</span>
      <button class="tbtn" id="themeBtn" title="切换深色/浅色主题">☀️</button>
      <button class="tbtn" id="resetBtn" title="清空进度，从 Gumbel 重新探案">🔄 重新探案</button>
      <label class="toggle" title="解锁后可自由调参把玩">
        <input type="checkbox" id="freeToggle" />
        <span class="sw"></span><span>🎲 我想自己玩</span>
      </label>
    </div>
  </div>

  <div class="main">
    <!-- 左：磁流粒子舞台 -->
    <div class="card stage">
      <div class="stage-head">
        <span class="suspect-badge" id="suspectBadge">嫌疑人</span>
        <span class="tail-tag" id="tailTag">尾</span>
        <span class="hint-line" id="stageHint" style="margin-left:auto;"></span>
      </div>
      <div class="canvas-shell">
        <canvas id="flow"></canvas>
        <span class="corner-label cl-ul">↖ 左上</span>
        <span class="corner-label cl-ur">右上 ↗</span>
        <span class="corner-label cl-ll">↙ 左下</span>
        <span class="corner-label cl-lr">右下 ↘</span>
        <span class="axis-hint">U →　　↑ V</span>
      </div>
      <div class="kpis">
        <div class="kpi" id="kpiTau"><div class="k-name">Kendall τ</div><div class="k-val">0.00</div><div class="k-bar"><div class="k-fill" style="background:#7b88a3"></div></div></div>
        <div class="kpi" id="kpiLL"><div class="k-name">λ_L 下尾</div><div class="k-val">0.00</div><div class="k-bar"><div class="k-fill" style="background:var(--blue)"></div></div></div>
        <div class="kpi" id="kpiLU"><div class="k-name">λ_U 上尾</div><div class="k-val">0.00</div><div class="k-bar"><div class="k-fill" style="background:var(--red)"></div></div></div>
      </div>
    </div>

    <!-- 右：审讯控制台 -->
    <div class="card console">
      <div class="task-card" id="taskCard">
        <div class="tc-h">🔍 审讯任务</div>
        <div class="goal" id="taskGoal">准备就绪…</div>
        <div class="task-progress"><div class="tp-fill" id="taskFill"></div></div>
      </div>
      <div id="controls"></div>
